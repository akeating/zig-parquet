name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Generate test files
        working-directory: test-files-arrow
        run: uv run python generate.py

      - name: Build and test library
        working-directory: zig-parquet
        run: zig build && zig build test

      - name: Build and test pqi
        working-directory: cli
        run: zig build && zig build test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os_label: linux-x86_64
            ext: ""
          - target: aarch64-linux
            os_label: linux-aarch64
            ext: ""
          - target: x86_64-macos
            os_label: macos-x86_64
            ext: ""
          - target: aarch64-macos
            os_label: macos-aarch64
            ext: ""
          - target: x86_64-windows
            os_label: windows-x86_64
            ext: ".exe"
          - target: aarch64-windows
            os_label: windows-aarch64
            ext: ".exe"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        working-directory: cli
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="pqi-${VERSION}-${{ matrix.os_label }}"
          mkdir -p staging

          if [[ "${{ matrix.ext }}" == ".exe" ]]; then
            cp cli/zig-out/bin/pqi${{ matrix.ext }} staging/
            cd staging && zip "../${ARCHIVE_NAME}.zip" pqi${{ matrix.ext }}
          else
            cp cli/zig-out/bin/pqi staging/
            cd staging && tar czf "../${ARCHIVE_NAME}.tar.gz" pqi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: pqi-${{ matrix.os_label }}
          path: pqi-*.*

  package-lib:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Package library
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "zig-parquet-${GITHUB_REF_NAME}.tar.gz" \
            -C zig-parquet \
            build.zig build.zig.zon src

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: zig-parquet-lib
          path: zig-parquet-*.tar.gz

  release:
    needs: [build, package-lib]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum pqi-* zig-parquet-* > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2 # no Node 24 version yet (issue #654)

        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/pqi-*
            artifacts/zig-parquet-*
            artifacts/checksums.txt
