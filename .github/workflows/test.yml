name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig-parquet:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate test files
        working-directory: test-files-arrow
        run: uv run python generate.py

      - name: Build library
        working-directory: zig-parquet
        run: zig build

      - name: Run tests
        working-directory: zig-parquet
        run: zig build test

      - name: WASM smoke test
        working-directory: zig-parquet
        run: zig build wasm-smoke

      - name: Build examples
        run: |
          cd zig-parquet/examples/basic && zig build
          cd ../../examples/large_file && zig build
          cd ../../examples/gen-eeg && zig build
          cd ../../examples/wasm_demo && zig build
          cd ../../examples/wasm_freestanding && zig build

      - name: Run freestanding WASM example
        working-directory: zig-parquet/examples/wasm_freestanding
        run: deno run --allow-read host/example.ts ${{ github.workspace }}/test-files-arrow/basic/basic_types_plain_uncompressed.parquet

      - name: Check interop artifacts are up to date
        run: git diff --exit-code test-files-arrow/interop/

  interop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Run interop tests
        working-directory: test-files-arrow
        run: uv run pytest test_interop.py -v

  pqi:
    needs: zig-parquet
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Generate test files
        working-directory: test-files-arrow
        run: uv run python generate.py

      - name: Build pqi
        working-directory: cli
        run: zig build

      - name: Run tests
        working-directory: cli
        run: zig build test
